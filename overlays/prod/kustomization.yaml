apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: smart-mobility-prod-cpp

commonLabels:
  environment: production

resources:
  - ../../base
  - namespace.yaml

patches:
  - target:
      kind: Namespace
      name: smart-mobility-cpp
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: smart-mobility-cpp
  - target:
      kind: Deployment
      name: smart-mobility-backend-cpp
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"

images:
  - name: quay.io/rh_ee_kmotojim/smart-mobility-backend-cpp
    newTag: "87d129251875531d764d4b118d2de1f82d510eca"

replicas:
  - name: smart-mobility-backend-cpp
    count: 2
