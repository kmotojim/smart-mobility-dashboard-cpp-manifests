apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: smart-mobility-dev-cpp

commonLabels:
  environment: development

resources:
  - ../../base
  - namespace.yaml

patches:
  - target:
      kind: Namespace
      name: smart-mobility-cpp
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: smart-mobility-cpp

replicas:
  - name: smart-mobility-backend-cpp
    count: 1
