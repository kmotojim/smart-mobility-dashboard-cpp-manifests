apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-mobility-dashboard-cpp-dev
  namespace: openshift-gitops
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded-e2e.e2e-tekton: ""
  labels:
    app.kubernetes.io/name: smart-mobility-dashboard-cpp
    environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: smart-mobility-cpp
  source:
    repoURL: https://github.com/kmotojim/smart-mobility-dashboard-cpp-manifests.git
    targetRevision: develop
    path: overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: smart-mobility-dev-cpp
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
